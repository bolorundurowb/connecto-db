name: Go Client

on:
  push:
    paths:
      - "clients/go/**"
    tags:
      - "go/v*"
  pull_request:
    paths:
      - "clients/go/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/go/connecto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...

  publish:
    if: startsWith(github.ref, 'refs/tags/go/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches go.mod version
        run: |
          TAG="${GITHUB_REF#refs/tags/go/v}"
          MOD_VERSION=$(grep '^go ' clients/go/connecto/go.mod | awk '{print $2}')
          echo "Tag: $TAG, go.mod version: $MOD_VERSION"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Go Client ${{ github.ref_name }}
          generate_release_notes: true
