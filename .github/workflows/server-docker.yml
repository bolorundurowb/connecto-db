name: Server Docker

on:
  push:
    paths:
      - "server/**"
    tags:
      - "server/v*"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t connecto-server ./server

  publish:
    if: startsWith(github.ref, 'refs/tags/server/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/connecto-server:latest
            ghcr.io/${{ github.repository }}/connecto-server:${{ github.ref_name }}
