name: Java Client

on:
  push:
    paths:
      - "clients/java/**"
    tags:
      - "java/v*"
  pull_request:
    paths:
      - "clients/java/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: mvn -B compile

  publish:
    if: startsWith(github.ref, 'refs/tags/java/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          server-id: github
      - run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
