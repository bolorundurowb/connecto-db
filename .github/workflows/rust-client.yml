name: Rust Client

on:
  push:
    paths:
      - "clients/rust/**"
    tags:
      - "rust/v*"
  pull_request:
    paths:
      - "clients/rust/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/rust/connecto-client
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo clippy -- -D warnings
      - run: cargo test

  publish:
    if: startsWith(github.ref, 'refs/tags/rust/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/rust/connecto-client
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
